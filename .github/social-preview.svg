<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Memory Reading</title>
  <desc id="description">Turn relevant AI memory into the right book for what matters now.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#background)"/>
  <circle cx="1130" cy="80" r="240" fill="#6366f1" opacity="0.16"/>
  <circle cx="1040" cy="610" r="300" fill="#a78bfa" opacity="0.08"/>

  <g transform="translate(100 104)">
    <rect x="0" y="0" width="82" height="82" rx="22" fill="#ffffff" opacity="0.1"/>
    <path d="M22 22h22c12 0 18 7 18 18v30H40c-12 0-18-7-18-18V22Z" fill="url(#book)"/>
    <path d="M62 40H50c-7 0-10 4-10 11v19h22V40Z" fill="#f5f3ff" opacity="0.9"/>
  </g>

  <text x="100" y="252" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="700" letter-spacing="-2">Memory Reading</text>
  <text x="100" y="326" fill="#c7d2fe" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32">AI memory → the right book for what matters now</text>

  <g transform="translate(100 398)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect width="770" height="112" rx="24" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="30" y="45" fill="#a5b4fc" font-size="20" font-weight="600">WHY NOW?</text>
    <text x="30" y="79" fill="#f8fafc" font-size="25">One verified recommendation, grounded in your current context.</text>
  </g>

  <g transform="translate(970 244) rotate(7)" filter="url(#shadow)">
    <rect width="190" height="250" rx="14" fill="url(#book)"/>
    <rect x="18" y="18" width="154" height="214" rx="7" fill="#312e81" opacity="0.92"/>
    <circle cx="95" cy="78" r="34" fill="#a5b4fc" opacity="0.22"/>
    <path d="M76 78c0-12 8-20 19-20s19 8 19 20-8 20-19 20-19-8-19-20Zm-8 55c0-15 12-25 27-25s27 10 27 25" fill="none" stroke="#e0e7ff" stroke-width="7" stroke-linecap="round"/>
    <text x="95" y="184" text-anchor="middle" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">YOUR NEXT</text>
    <text x="95" y="208" text-anchor="middle" fill="#c7d2fe" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">BOOK</text>
  </g>

  <text x="100" y="574" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">github.com/Fov6363/memory-reading-skill</text>
</svg>
